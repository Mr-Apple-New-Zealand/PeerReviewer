name: AI Code Review

on:
  workflow_dispatch

# contents:write is required to post commit comments
permissions:
  contents: write

env:
  OLLAMA_URL: ${{ vars.AI_ASSISTANT_OLLAMA_URL }}
  OLLAMA_MODEL: ${{ vars.AI_ASSISTANT_OLLAMA_MODEL }}
  AI_ASSISTANT_MODEL_NUM_CTX: ${{ vars.AI_ASSISTANT_MODEL_NUM_CTX }}

jobs:
  code-review:
    # REQUIRED: must use a self-hosted runner that can reach 192.168.10.100
    # Add additional labels (e.g. [self-hosted, linux]) to target a specific runner
    runs-on: mra-ubuntu
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: Qwen3.5-122B
          fetch-depth: 0

      - name: Set AI assistant context from variable
        run: |
          val="${{ vars.AI_ASSISTANT_MODEL_NUM_CTX }}"
          if [ -n "$val" ]; then echo "AI_ASSISTANT_MODEL_NUM_CTX=$val" >> "$GITHUB_ENV"; fi

      # -----------------------------------------------------------------------
      # Build the diff for the entire branch against the nearest base branch.
      # Uses merge-base so that commits already on dev/main/master are excluded.
      # -----------------------------------------------------------------------
      - name: Get branch diff
        id: diff
        run: |
          BASE_BRANCH=""
          for CANDIDATE in dev main master; do
            if git fetch origin "${CANDIDATE}" 2>/dev/null; then
              BASE_BRANCH="${CANDIDATE}"
              break
            fi
          done

          if [ -z "$BASE_BRANCH" ]; then
            echo "Could not find a base branch to compare against — skipping."
            echo "empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MERGE_BASE=$(git merge-base HEAD "origin/${BASE_BRANCH}" 2>/dev/null \
            || git rev-list --max-parents=0 HEAD)
          echo "Base branch: origin/${BASE_BRANCH}, merge-base: ${MERGE_BASE}"

          git diff "${MERGE_BASE}..HEAD" \
            --unified=5 \
            -- ':!*.lock' ':!*.min.js' ':!*.min.css' ':!package-lock.json' \
            ':!yarn.lock' ':!*.sum' ':!dist/' ':!build/' \
            > branch_diff.txt

          DIFF_SIZE=$(wc -c < branch_diff.txt)
          echo "diff_size=${DIFF_SIZE}" >> "$GITHUB_OUTPUT"

          if [ "$DIFF_SIZE" -eq 0 ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no relevant changes
        if: steps.diff.outputs.empty == 'true'
        run: echo "No reviewable changes on this branch — skipping AI review."

      # -----------------------------------------------------------------------
      # Send the diff to Ollama and save the review to review.txt
      # -----------------------------------------------------------------------
      - name: Request review from Ollama
        if: steps.diff.outputs.empty == 'false'
        env:
          AI_ASSISTANT_MODEL_NUM_PREDICT: ${{ vars.AI_ASSISTANT_MODEL_NUM_PREDICT }}
          AI_ASSISTANT_MODEL_PROMPT: ${{ vars.AI_ASSISTANT_MODEL_PROMPT }}
          AI_ASSISTANT_MODEL_TEMPERATURE: ${{ vars.AI_ASSISTANT_MODEL_TEMPERATURE }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys

          branch_name = os.environ.get("BRANCH_NAME", "(unknown branch)")
          commit_sha = os.environ.get("COMMIT_SHA", "(unknown commit)")
          model = os.environ.get("OLLAMA_MODEL")
          base_url = os.environ.get("OLLAMA_URL")

          with open("branch_diff.txt", "r", errors="replace") as f:
              diff = f.read()

          # Truncate oversized diffs to avoid exceeding the model's context window.
          # Adjust max_chars to match your num_ctx setting minus prompt overhead.
          max_chars = int(os.environ.get("AI_ASSISTANT_MODEL_NUM_CTX", "262144"))
          truncated = len(diff) > max_chars
          if truncated:
              diff = diff[:max_chars]

          truncation_note = "[Note: the diff below was truncated to fit the context window]" if truncated else ""
          prompt_template = os.environ.get("AI_ASSISTANT_MODEL_PROMPT") or (
              "Branch: {branch_name}\nCommit: {commit_sha}\n\n{truncation_note}\n\n```diff\n{diff}\n```"
          )
          # Normalize legacy f-string expression to placeholder so .format() does not raise KeyError
          prompt_template = prompt_template.replace(
              '{"[Note: the diff below was truncated to fit the context window]" if truncated else ""}',
              "{truncation_note}",
          )
          prompt = prompt_template.format(
              branch_name=branch_name,
              commit_sha=commit_sha,
              diff=diff,
              truncation_note=truncation_note,
          )

          num_ctx = int(os.environ.get("AI_ASSISTANT_MODEL_NUM_CTX", "262144"))
          num_predict = int(os.environ.get("AI_ASSISTANT_MODEL_NUM_PREDICT", "2048"))
          temperature = float(os.environ.get("AI_ASSISTANT_MODEL_TEMPERATURE", "0.3"))
          payload = {
              "model": model,
              "prompt": prompt,
              "stream": False,
              "options": {
                  "temperature": temperature,
                  "num_ctx": num_ctx,
                  "num_predict": num_predict,
              },
          }

          with open("payload.json", "w") as f:
              json.dump(payload, f)

          print(f"Calling {base_url}/api/generate with model {model} …")

          result = subprocess.run(
              [
                  "curl", "-sf", "--max-time", "900",
                  "-X", "POST", f"{base_url}/api/generate",
                  "-H", "Content-Type: application/json",
                  "-d", "@payload.json",
              ],
              capture_output=True,
              text=True,
          )

          if result.returncode != 0:
              print(f"ERROR: curl failed (exit {result.returncode})\n{result.stderr}", file=sys.stderr)
              sys.exit(1)

          try:
              data = json.loads(result.stdout)
          except json.JSONDecodeError as exc:
              print(f"ERROR: Could not parse Ollama response: {exc}", file=sys.stderr)
              print(f"Raw output (first 500 chars): {result.stdout[:500]}", file=sys.stderr)
              sys.exit(1)

          review = data.get("response", "").strip()
          if not review:
              print("ERROR: Ollama returned an empty response.", file=sys.stderr)
              sys.exit(1)

          with open("review.txt", "w") as f:
              f.write(review)

          print("Review saved to review.txt")
          PYEOF

      # -----------------------------------------------------------------------
      # Score the review against every known issue in ISSUES.md.
      # A second Ollama call receives both the review and the issues reference
      # and produces a scorecard table (Found / Partial / Missed per issue ID).
      # -----------------------------------------------------------------------
      - name: Score review against ISSUES.md
        if: steps.diff.outputs.empty == 'false'
        env:
          AI_ASSISTANT_MODEL_NUM_PREDICT: ${{ vars.AI_ASSISTANT_MODEL_NUM_PREDICT }}
          AI_ASSISTANT_MODEL_TEMPERATURE: ${{ vars.AI_ASSISTANT_MODEL_TEMPERATURE }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys

          model = os.environ.get("OLLAMA_MODEL")
          base_url = os.environ.get("OLLAMA_URL")
          branch_name = os.environ.get("BRANCH_NAME", "(unknown branch)")
          commit_sha = os.environ.get("COMMIT_SHA", "(unknown commit)")

          with open("review.txt", "r", errors="replace") as f:
              review = f.read()

          with open("ISSUES.md", "r", errors="replace") as f:
              issues = f.read()

          scoring_prompt = f"""You are a QA evaluator assessing how well an AI code review tool performed.

Below is a reference document listing every known intentional issue in the codebase, followed by the AI review that was produced.

Your task:
- Work through EVERY issue ID in the reference document (C1–C11, L1–L5, R1–R3, E1–E7, RL1–RL5, N1–N7, M1–M5, D1–D11, A1–A6, CF1–CF9, and the missing unit tests).
- For each one, decide whether the review **Found** it, **Partially** identified it, or **Missed** it entirely.
- Output a Markdown document titled "# AI Review Scorecard" with:
  1. A summary line: total Found / Partial / Missed counts out of the total number of issues.
  2. One table per category (matching the categories in the reference document). Each table must have the columns: | ID | Description | Status | Notes |
     - Status must be exactly one of: ✅ Found | ⚠️ Partial | ❌ Missed
     - Notes: a brief quote or explanation (one sentence max). Leave blank for Missed items.
- Do not add any other commentary outside the scorecard document.

---
## Reference Issues

{issues}

---
## AI Review Output

{review}
"""

          num_ctx = int(os.environ.get("AI_ASSISTANT_MODEL_NUM_CTX", "262144"))
          # Scoring output is larger than a normal review — use a higher token budget
          num_predict = max(int(os.environ.get("AI_ASSISTANT_MODEL_NUM_PREDICT", "2048")), 4096)
          temperature = float(os.environ.get("AI_ASSISTANT_MODEL_TEMPERATURE", "0.3"))

          max_chars = num_ctx
          if len(scoring_prompt) > max_chars:
              # Truncate the review portion to stay within context; issues list is kept whole
              overflow = len(scoring_prompt) - max_chars
              review = review[: max(0, len(review) - overflow - 200)]
              scoring_prompt = scoring_prompt.replace(review, review)

          payload = {
              "model": model,
              "prompt": scoring_prompt,
              "stream": False,
              "options": {
                  "temperature": temperature,
                  "num_ctx": num_ctx,
                  "num_predict": num_predict,
              },
          }

          with open("scoring_payload.json", "w") as f:
              json.dump(payload, f)

          print(f"Calling {base_url}/api/generate for scorecard (model: {model}) …")

          result = subprocess.run(
              [
                  "curl", "-sf", "--max-time", "900",
                  "-X", "POST", f"{base_url}/api/generate",
                  "-H", "Content-Type: application/json",
                  "-d", "@scoring_payload.json",
              ],
              capture_output=True,
              text=True,
          )

          if result.returncode != 0:
              print(f"ERROR: curl failed (exit {result.returncode})\n{result.stderr}", file=sys.stderr)
              sys.exit(1)

          try:
              data = json.loads(result.stdout)
          except json.JSONDecodeError as exc:
              print(f"ERROR: Could not parse Ollama response: {exc}", file=sys.stderr)
              print(f"Raw output (first 500 chars): {result.stdout[:500]}", file=sys.stderr)
              sys.exit(1)

          scorecard = data.get("response", "").strip()
          if not scorecard:
              print("ERROR: Ollama returned an empty scorecard response.", file=sys.stderr)
              sys.exit(1)

          header = (
              f"# AI Review Scorecard\n\n"
              f"> **Branch:** `{branch_name}` &nbsp;·&nbsp; **Commit:** `{commit_sha[:7]}`\n\n"
          )

          with open("issues_scorecard.md", "w") as f:
              f.write(header + scorecard)

          print("Scorecard saved to issues_scorecard.md")
          PYEOF

      # -----------------------------------------------------------------------
      # Print the scorecard to the workflow log so it is visible without
      # navigating away from the Actions run page.
      # -----------------------------------------------------------------------
      - name: Print scorecard to workflow log
        if: steps.diff.outputs.empty == 'false'
        run: |
          echo "======================================================================"
          echo "  ISSUES.md SCORECARD"
          echo "======================================================================"
          cat issues_scorecard.md

      # -----------------------------------------------------------------------
      # Post both the review and the scorecard as a commit comment
      # -----------------------------------------------------------------------
      - name: Post review and scorecard as commit comment
        if: steps.diff.outputs.empty == 'false'
        uses: actions/github-script@v8
        env:
          OLLAMA_MODEL: ${{ env.OLLAMA_MODEL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            const scorecard = fs.readFileSync('issues_scorecard.md', 'utf8');
            const model = process.env.OLLAMA_MODEL;
            const sha = context.sha.substring(0, 7);

            const body = [
              '## 🤖 AI Code Review',
              '',
              `> **Model:** \`${model}\` &nbsp;·&nbsp; **Reviewed commit:** \`${sha}\``,
              '',
              review,
              '',
              '---',
              '',
              scorecard,
              '',
              '---',
              '*This review was generated automatically. Use your own judgment before acting on any suggestion.*',
            ].join('\n');

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });
